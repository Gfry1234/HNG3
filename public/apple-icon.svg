<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Apple icon style with weather theme -->
  <rect width="180" height="180" rx="40" fill="#f5f5f5"/>
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .apple-bg { fill: #1a1a1a; }
        .sun-icon { fill: #FFD700; }
        .cloud-icon { fill: #A0A0A0; }
      }
    </style>
  </defs>
  <g transform="translate(90, 90)">
    <!-- Sun circle -->
    <circle cx="-15" cy="-15" r="28" fill="#FDB813" class="sun-icon"/>
    <!-- Sun rays -->
    <g stroke="#FDB813" stroke-width="4" stroke-linecap="round" opacity="0.8">
      <line x1="-15" y1="-50" x2="-15" y2="-62"/>
      <line x1="-15" y1="50" x2="-15" y2="62"/>
      <line x1="-50" y1="-15" x2="-62" y2="-15"/>
      <line x1="50" y1="-15" x2="62" y2="-15"/>
    </g>
    <!-- Cloud -->
    <path d="M 10 0 Q 5 0 5 -5 Q 5 -10 10 -10 Q 12 -18 22 -18 Q 28 -22 35 -18 Q 40 -20 45 -15 Q 60 -18 65 -5 Q 75 -5 75 5 Q 75 18 65 18 L 10 18 Q 0 18 0 8 Q 0 0 10 0 Z" fill="#D3D3D3" class="cloud-icon" stroke="#A0A0A0" stroke-width="1"/>
    <!-- Rain drops from cloud -->
    <g stroke="#87CEEB" stroke-width="2" stroke-linecap="round" opacity="0.7">
      <line x1="15" y1="22" x2="12" y2="32"/>
      <line x1="35" y1="22" x2="32" y2="32"/>
      <line x1="55" y1="22" x2="52" y2="32"/>
    </g>
  </g>
</svg>