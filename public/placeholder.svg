<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" fill="none">
  <defs>
    <style>
      @media (prefers-color-scheme: light) {
        .weather-bg { fill: #f5f5f5; }
        .sun-light { fill: #FFD700; }
        .cloud-light { fill: #D3D3D3; }
        .text-light { fill: #333333; }
      }
      @media (prefers-color-scheme: dark) {
        .weather-bg { fill: #2a2a2a; }
        .sun-light { fill: #FFA500; }
        .cloud-light { fill: #808080; }
        .text-light { fill: #E0E0E0; }
      }
    </style>
  </defs>
  <rect width="1200" height="1200" class="weather-bg" rx="12"/>
  <!-- Large sun in background -->
  <circle cx="800" cy="250" r="180" class="sun-light" opacity="0.3"/>
  <!-- Cloud -->
  <path d="M 200 500 Q 180 500 180 480 Q 180 460 200 460 Q 210 420 250 420 Q 280 400 320 420 Q 350 410 380 440 Q 450 430 480 480 Q 550 480 550 540 Q 550 600 480 600 L 200 600 Q 100 600 100 540 Q 100 500 200 500 Z" class="cloud-light" stroke="#999" stroke-width="8"/>
  <!-- Rain drops -->
  <g stroke="#87CEEB" stroke-width="12" stroke-linecap="round" opacity="0.7">
    <line x1="220" y1="610" x2="200" y2="680"/>
    <line x1="350" y1="610" x2="330" y2="680"/>
    <line x1="480" y1="610" x2="460" y2="680"/>
  </g>
  <!-- Decorative sun rays in corner -->
  <g stroke="#FFD700" stroke-width="20" stroke-linecap="round" opacity="0.4">
    <line x1="900" y1="100" x2="900" y2="20"/>
    <line x1="1000" y1="200" x2="1050" y2="150"/>
    <line x1="1050" y1="100" x2="1100" y2="50"/>
  </g>
  <!-- Weather App Text -->
  <text x="600" y="1000" font-size="120" font-weight="bold" text-anchor="middle" class="text-light" font-family="system-ui, -apple-system, sans-serif">WEATHER APP</text>
</svg>