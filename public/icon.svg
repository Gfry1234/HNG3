<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="37" class="background"/>
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #f0f0f0; }
      .sun-rays { stroke: #FDB813; }
      .sun-circle { fill: #FDB813; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #1a1a1a; }
      .sun-rays { stroke: #FFD700; }
      .sun-circle { fill: #FFD700; }
    }
  </style>
  <g transform="translate(90, 90)">
    <!-- Sun rays -->
    <g class="sun-rays" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-35" x2="0" y2="-50"/>
      <line x1="0" y1="35" x2="0" y2="50"/>
      <line x1="-35" y1="0" x2="-50" y2="0"/>
      <line x1="35" y1="0" x2="50" y2="0"/>
      <line x1="-25" y1="-25" x2="-35" y2="-35"/>
      <line x1="25" y1="25" x2="35" y2="35"/>
      <line x1="25" y1="-25" x2="35" y2="-35"/>
      <line x1="-25" y1="25" x2="-35" y2="35"/>
    </g>
    <!-- Sun circle -->
    <circle class="sun-circle" cx="0" cy="0" r="25"/>
  </g>
</svg>