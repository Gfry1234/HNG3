<svg xmlns="http://www.w3.org/2000/svg" width="200" height="48" viewBox="0 0 200 48" fill="none">
  <style>
    @media (prefers-color-scheme: light) {
      .cloud { fill: #A0A0A0; stroke: #707070; }
      .rain { stroke: #4A90E2; }
    }
    @media (prefers-color-scheme: dark) {
      .cloud { fill: #C0C0C0; stroke: #909090; }
      .rain { stroke: #87CEEB; }
    }
  </style>
  <!-- Cloud with rain drops (Weather logo) -->
  <path class="cloud" d="M 40 28 Q 32 28 32 23 Q 32 18 40 18 Q 42 8 52 8 Q 58 3 65 8 Q 70 6 75 10 Q 90 8 95 23 Q 105 23 105 33 Q 105 43 95 43 L 40 43 Q 30 43 30 33 Q 30 28 40 28 Z" stroke-width="1"/>
  <g class="rain" stroke-width="1.5" stroke-linecap="round">
    <line x1="42" y1="45" x2="38" y2="53"/>
    <line x1="58" y1="45" x2="54" y2="53"/>
    <line x1="74" y1="45" x2="70" y2="53"/>
    <line x1="90" y1="45" x2="86" y2="53"/>
  </g>
  <!-- Text: WEATHER -->
  <text x="130" y="35" font-size="24" font-weight="bold" class="weather-text" style="fill: currentColor">WEATHER</text>
</svg>